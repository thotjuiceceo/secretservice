# Hugo configuration file
baseURL: "https://thotjuiceceo.github.io/SecretService/"
languageCode: en-us
title: Secret Service Project

module:
  imports:
    - path: github.com/imfing/hextra



markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Registration
      pageRef: /signup
      weight: 2
    - identifier: about
      name: About
      pageRef: /about
      weight: 1
    - name: All About Us
      pageRef: /about
      parent: about
    - name: Bar Crawl
      pageRef: /about/crawl
      parent: about
    - name: Organizations
      pageRef: /about/orgs
      parent: about
    - name: Sponsors
      pageRef: /sponsors
      weight: 3  
    - name: Contact ↗
      url: "https://github.com/imfing"
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: Facebook
      weight: 6
      url: "http://facebook.com"
      params:
        icon: facebook
    - name: Instagram
      weight: 7
      url: "https://www.instagram.com/thtjuice/"
      params:
        icon: instagram

  sidebar:
    - identifier: more
      name: "More:"
      params:
        type: separator
      weight: 1
    - identifier: home
      name: "Back to Home"
      pageRef: "/"
      weight: 2

#banner:
#  key: 'announcement-v0.11'
#  message: |
#    2/11/26 - 2026 Registration is now underway! 🎉 Sign up [here]({{% ref "signup/" %}})

page:
  width: normal

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: badgefleurblack.png # These are both located in the static folder. idk why it wont work in the images folder.
      dark: badgefleurwhite.png
      width: 60
    width: wide

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  theme:
  # light | dark | system
  default: dark
  dispalyToggle: false

caches:
  images:
    dir: :cacheDir/images